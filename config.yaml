# muhomu config — declares the material conditions of the dashboard.
# Edit this file to configure the app. Restart to apply changes.

theme: dark
font_latin: inter
font_jp: dotgothic16
font_clock: orbitron
clock_format: 24h
clock_seconds: false
clock_theme: theme
bg_blur: true
ui_lang: en
title_lang: ja
username: "ghost_user"
search_target: _blank

location:
  city: "Rafaela"
  lat: ""
  lon: ""

search_engines:
  - name: duckduckgo
    url: "https://duckduckgo.com/?q="
    default: true
  - name: youtube
    url: "https://www.youtube.com/results?search_query="
  - name: github
    url: "https://github.com/search?q="

jlpt_level: all

# Column layout — size is "small" (250px) or "full" (remaining space).
# Widgets are listed in display order within each column.
# Available widgets: quick-access, bookmarks, notes, recently-visited,
#                   quote, kotoba, system-stats, timer, rain, image, calendar
columns:
  - size: small
    widgets:
      - id: quick-access
      - id: timer
      - id: rain
      - id: quote

  - size: full
    widgets:
      - id: bookmarks
      - id: notes
      - id: recently-visited

  - size: small
    widgets:
      - id: image
      - id: status
      - id: system-stats
      - id: calendar
